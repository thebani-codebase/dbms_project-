<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Scheme Portal - Login & Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            margin: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .btn:hover {
            background: #5a6fd8;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .hidden {
            display: none;
        }
        
        .document-upload {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }
        
        .document-upload:hover {
            border-color: #667eea;
        }
        
        .document-upload.dragover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .file-list {
            margin-top: 15px;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        
        .file-item .file-name {
            font-size: 14px;
            color: #333;
        }
        
        .file-item .remove-file {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-indicator.online {
            background: #28a745;
        }
        
        .status-indicator.offline {
            background: #dc3545;
        }
        
        .quick-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
        }
        
        .quick-links a {
            display: inline-block;
            margin: 5px;
            padding: 8px 16px;
            background: #f8f9fa;
            color: #667eea;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.3s ease;
        }
        
        .quick-links a:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🇮🇳 Yogna Sathi Portal</h1>
            <p>Government Scheme Eligibility & Enrollment System</p>
        </div>
        
        <div id="statusBar" style="text-align: center; margin-bottom: 20px;">
            <span class="status-indicator offline" id="statusIndicator"></span>
            <span id="statusText">Checking connection...</span>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
            <button class="tab" onclick="switchTab('documents')">Documents</button>
        </div>
        
        <div id="alertContainer"></div>
        
        <!-- Login Form -->
        <div id="loginForm" class="tab-content">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginAadhaar">Aadhaar Number</label>
                    <input type="text" id="loginAadhaar" placeholder="Enter 12-digit Aadhaar number" maxlength="12" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn" id="loginBtn">
                    <span id="loginBtnText">Login</span>
                </button>
            </form>
        </div>
        
        <!-- Registration Form -->
        <div id="registerForm" class="tab-content hidden">
            <form onsubmit="handleRegistration(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" placeholder="Enter first name" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" placeholder="Enter last name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="aadhaarNumber">Aadhaar Number</label>
                    <input type="text" id="aadhaarNumber" placeholder="Enter 12-digit Aadhaar number" maxlength="12" required>
                </div>
                
                <div class="form-group">
                    <label for="dateOfBirth">Date of Birth</label>
                    <input type="date" id="dateOfBirth" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="maritalStatus">Marital Status</label>
                        <select id="maritalStatus" required>
                            <option value="">Select Status</option>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Widow">Widow</option>
                            <option value="Divorced">Divorced</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="annualIncome">Annual Income (₹)</label>
                        <input type="number" id="annualIncome" placeholder="Enter annual income" required>
                    </div>
                    <div class="form-group">
                        <label for="occupation">Occupation</label>
                        <input type="text" id="occupation" placeholder="Enter occupation" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="casteCategory">Caste Category</label>
                        <select id="casteCategory" required>
                            <option value="">Select Category</option>
                            <option value="General">General</option>
                            <option value="SC">SC</option>
                            <option value="ST">ST</option>
                            <option value="OBC">OBC</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="isBPL">BPL Status</label>
                        <select id="isBPL" required>
                            <option value="">Select Status</option>
                            <option value="N">Not BPL</option>
                            <option value="Y">BPL</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="location">Location</label>
                    <select id="location" required>
                        <option value="">Select Location</option>
                        <option value="1">Amritsar</option>
                        <option value="2">Ludhiana</option>
                        <option value="3">Jalandhar</option>
                        <option value="4">Patiala</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create password" required>
                </div>
                
                <button type="submit" class="btn" id="registerBtn">
                    <span id="registerBtnText">Register</span>
                </button>
            </form>
        </div>
        
        <!-- Document Upload Form -->
        <div id="documentsForm" class="tab-content hidden">
            <form onsubmit="handleDocumentUpload(event)">
                <div class="form-group">
                    <label for="documentAadhaar">Aadhaar Number</label>
                    <input type="text" id="documentAadhaar" placeholder="Enter 12-digit Aadhaar number" maxlength="12" required>
                </div>
                
                <div class="form-group">
                    <label for="documentType">Document Type</label>
                    <select id="documentType" required>
                        <option value="">Select Document Type</option>
                        <option value="Aadhaar Card">Aadhaar Card</option>
                        <option value="Income Certificate">Income Certificate</option>
                        <option value="Land Records">Land Records</option>
                        <option value="Educational Certificate">Educational Certificate</option>
                        <option value="Medical Certificate">Medical Certificate</option>
                        <option value="Caste Certificate">Caste Certificate</option>
                        <option value="Residence Proof">Residence Proof</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Upload Document</label>
                    <div class="document-upload" onclick="document.getElementById('fileInput').click()" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                        <p>📄 Drag & drop document here or click to browse</p>
                        <input type="file" id="fileInput" style="display: none;" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFileSelect(event)">
                    </div>
                    <div id="fileList" class="file-list"></div>
                </div>
                
                <button type="submit" class="btn" id="uploadBtn">
                    <span id="uploadBtnText">Upload Document</span>
                </button>
            </form>
        </div>
        
        <div class="quick-links">
            <a href="oracle-query-interface.html">🗄️ Oracle Query</a>
            <a href="database-interface.html">👥 Database Management</a>
            <a href="index.html">🏠 Main Portal</a>
        </div>
    </div>
    
    <script>
        // Global variables
        let uploadedFiles = [];
        let currentUser = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkBackendConnection();
            loadStoredUser();
        });
        
        // Check backend connection
        async function checkBackendConnection() {
            try {
                const response = await fetch('http://localhost:3000/health');
                if (response.ok) {
                    updateConnectionStatus(true);
                } else {
                    throw new Error('Backend not responding');
                }
            } catch (error) {
                updateConnectionStatus(false);
            }
        }
        
        // Update connection status
        function updateConnectionStatus(isOnline) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (isOnline) {
                indicator.className = 'status-indicator online';
                statusText.textContent = 'Connected to Database';
            } else {
                indicator.className = 'status-indicator offline';
                statusText.textContent = 'Database Offline - Using Local Storage';
            }
        }
        
        // Tab switching
        function switchTab(tabName) {
            // Hide all forms
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('documentsForm').classList.add('hidden');
            
            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            
            // Show selected form and activate tab
            document.getElementById(tabName + 'Form').classList.remove('hidden');
            event.target.classList.add('active');
            
            // Clear alerts
            clearAlerts();
        }
        
        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            
            const aadhaar = document.getElementById('loginAadhaar').value;
            const password = document.getElementById('loginPassword').value;
            
            // Show loading
            setButtonLoading('loginBtn', true);
            
            try {
                // Check if user exists in database
                const response = await fetch('http://localhost:3000/api/v1/beneficiary/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        aadhaarNumber: aadhaar,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    // Store user session
                    currentUser = result.data;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    showAlert('Login successful! Redirecting to dashboard...', 'success');
                    
                    // Redirect to dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    // Try local storage fallback
                    const localUser = authenticateUser(aadhaar, password);
                    if (localUser) {
                        currentUser = localUser;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        showAlert('Login successful! (Local Mode)', 'success');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        showAlert('Invalid Aadhaar number or password', 'error');
                    }
                }
            } catch (error) {
                // Fallback to local authentication
                const localUser = authenticateUser(aadhaar, password);
                if (localUser) {
                    currentUser = localUser;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showAlert('Login successful! (Local Mode)', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showAlert('Login failed. Please try again.', 'error');
                }
            }
            
            setButtonLoading('loginBtn', false);
        }
        
        // Handle registration
        async function handleRegistration(event) {
            event.preventDefault();
            
            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                aadhaarNumber: document.getElementById('aadhaarNumber').value,
                dateOfBirth: document.getElementById('dateOfBirth').value,
                gender: document.getElementById('gender').value,
                maritalStatus: document.getElementById('maritalStatus').value,
                annualIncome: parseInt(document.getElementById('annualIncome').value),
                occupation: document.getElementById('occupation').value,
                casteCategory: document.getElementById('casteCategory').value,
                isBPL: document.getElementById('isBPL').value,
                locationId: parseInt(document.getElementById('location').value),
                password: document.getElementById('password').value
            };
            
            setButtonLoading('registerBtn', true);
            
            try {
                // Save to database
                const response = await fetch('http://localhost:3000/api/v1/beneficiary/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showAlert('Registration successful! You can now login.', 'success');
                    
                    // Clear form
                    document.getElementById('registerForm').querySelector('form').reset();
                    
                    // Switch to login tab
                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    throw new Error(result.message || 'Registration failed');
                }
            } catch (error) {
                // Fallback to local storage
                saveUserToLocalStorage(formData);
                showAlert('Registration successful! (Local Mode)', 'success');
                document.getElementById('registerForm').querySelector('form').reset();
                setTimeout(() => {
                    switchTab('login');
                }, 2000);
            }
            
            setButtonLoading('registerBtn', false);
        }
        
        // Handle document upload
        async function handleDocumentUpload(event) {
            event.preventDefault();
            
            if (uploadedFiles.length === 0) {
                showAlert('Please select a document to upload', 'error');
                return;
            }
            
            const aadhaarNumber = document.getElementById('documentAadhaar').value;
            const documentType = document.getElementById('documentType').value;
            
            setButtonLoading('uploadBtn', true);
            
            try {
                // Create FormData for file upload
                const formData = new FormData();
                formData.append('aadhaarNumber', aadhaarNumber);
                formData.append('documentType', documentType);
                formData.append('document', uploadedFiles[0]);
                
                // Upload to database
                const response = await fetch('http://localhost:3000/api/v1/documents/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showAlert('Document uploaded successfully!', 'success');
                    
                    // Clear form
                    document.getElementById('documentsForm').querySelector('form').reset();
                    uploadedFiles = [];
                    updateFileList();
                } else {
                    throw new Error(result.message || 'Upload failed');
                }
            } catch (error) {
                // Fallback to local storage
                saveDocumentToLocalStorage(aadhaarNumber, documentType, uploadedFiles[0]);
                showAlert('Document uploaded successfully! (Local Mode)', 'success');
                document.getElementById('documentsForm').querySelector('form').reset();
                uploadedFiles = [];
                updateFileList();
            }
            
            setButtonLoading('uploadBtn', false);
        }
        
        // File handling
        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                uploadedFiles = Array.from(files);
                updateFileList();
            }
        }
        
        function handleDrop(event) {
            event.preventDefault();
            event.stopPropagation();
            document.querySelector('.document-upload').classList.remove('dragover');
            
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                uploadedFiles = Array.from(files);
                updateFileList();
            }
        }
        
        function handleDragOver(event) {
            event.preventDefault();
            event.stopPropagation();
            document.querySelector('.document-upload').classList.add('dragover');
        }
        
        function handleDragLeave(event) {
            event.preventDefault();
            event.stopPropagation();
            document.querySelector('.document-upload').classList.remove('dragover');
        }
        
        function updateFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            uploadedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span class="file-name">${file.name} (${formatFileSize(file.size)})</span>
                    <button type="button" class="remove-file" onclick="removeFile(${index})">Remove</button>
                `;
                fileList.appendChild(fileItem);
            });
        }
        
        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            updateFileList();
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Local storage functions
        function saveUserToLocalStorage(userData) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Check if user already exists
            const existingUser = users.find(u => u.aadhaarNumber === userData.aadhaarNumber);
            if (existingUser) {
                throw new Error('User with this Aadhaar number already exists');
            }
            
            // Add new user
            const newUser = {
                ...userData,
                beneficiaryId: Date.now(),
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
        }
        
        function authenticateUser(aadhaarNumber, password) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            return users.find(u => u.aadhaarNumber === aadhaarNumber && u.password === password);
        }
        
        function saveDocumentToLocalStorage(aadhaarNumber, documentType, file) {
            const documents = JSON.parse(localStorage.getItem('documents') || '[]');
            
            const newDocument = {
                documentId: Date.now(),
                aadhaarNumber: aadhaarNumber,
                documentType: documentType,
                fileName: file.name,
                fileSize: file.size,
                uploadedAt: new Date().toISOString(),
                isVerified: 'N'
            };
            
            documents.push(newDocument);
            localStorage.setItem('documents', JSON.stringify(documents));
        }
        
        function loadStoredUser() {
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
            }
        }
        
        // Utility functions
        function setButtonLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            const buttonText = document.getElementById(buttonId + 'Text');
            
            if (isLoading) {
                button.disabled = true;
                buttonText.innerHTML = '<span class="loading"></span>Processing...';
            } else {
                button.disabled = false;
                buttonText.textContent = buttonId === 'loginBtn' ? 'Login' : 
                                  buttonId === 'registerBtn' ? 'Register' : 'Upload Document';
            }
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            
            alertContainer.appendChild(alert);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
        
        function clearAlerts() {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = '';
        }
    </script>
</body>
</html>
