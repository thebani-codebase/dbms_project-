<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Test - Yogna Sathi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .test-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }
        .test-button:hover {
            background: #5a6fd8;
        }
        .test-button.danger {
            background: #dc3545;
        }
        .test-button.danger:hover {
            background: #c82333;
        }
        .result {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
        .form-group {
            margin: 15px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Database Connection Test</h1>
        <div id="connectionStatus" class="status">Checking connection...</div>
        
        <h2>🔗 Links</h2>
        <p><strong>Main Website:</strong> <a href="http://127.0.0.1:5173" target="_blank">http://127.0.0.1:5173</a></p>
        <p><strong>Database Interface:</strong> <a href="http://127.0.0.1:5173/database-interface.html" target="_blank">http://127.0.0.1:5173/database-interface.html</a></p>
        <p><strong>Backend API:</strong> <a href="http://localhost:3000/health" target="_blank">http://localhost:3000/health</a></p>
        
        <h2>🧪 Test Database Operations</h2>
        
        <div class="form-group">
            <label for="testName">Test Name:</label>
            <input type="text" id="testName" value="Test User">
        </div>
        
        <div class="form-group">
            <label for="testAadhaar">Test Aadhaar:</label>
            <input type="text" id="testAadhaar" value="999999999999">
        </div>
        
        <button class="test-button" onclick="testConnection()">🔍 Test Connection</button>
        <button class="test-button" onclick="testAddBeneficiary()">➕ Add Test Beneficiary</button>
        <button class="test-button" onclick="testGetBeneficiaries()">👥 Get All Beneficiaries</button>
        <button class="test-button" onclick="testDeleteBeneficiary()" class="danger">🗑️ Delete Test Beneficiary</button>
        
        <div id="testResult" class="result"></div>
    </div>

    <script>
        let testBeneficiaryId = null;
        
        // Test connection to backend
        async function testConnection() {
            const resultDiv = document.getElementById('testResult');
            const statusDiv = document.getElementById('connectionStatus');
            
            try {
                const response = await fetch('http://localhost:3000/health');
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.className = 'status online';
                    statusDiv.textContent = '✅ Backend Connected: ' + data.service;
                    resultDiv.className = 'result success';
                    resultDiv.textContent = 'Connection successful!\n' + JSON.stringify(data, null, 2);
                } else {
                    throw new Error('Backend not responding');
                }
            } catch (error) {
                statusDiv.className = 'status offline';
                statusDiv.textContent = '❌ Backend Offline: ' + error.message;
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Connection failed: ' + error.message;
            }
        }
        
        // Test adding beneficiary
        async function testAddBeneficiary() {
            const resultDiv = document.getElementById('testResult');
            const name = document.getElementById('testName').value;
            const aadhaar = document.getElementById('testAadhaar').value;
            
            const beneficiaryData = {
                firstName: name,
                lastName: "Test",
                aadhaarNumber: aadhaar,
                dateOfBirth: "1990-01-01",
                gender: "M",
                maritalStatus: "Single",
                annualIncome: 50000,
                occupation: "Test",
                casteCategory: "General",
                location: "Test Location",
                phoneNumber: "9999999999",
                email: "test@example.com",
                isBpl: false
            };
            
            resultDiv.className = 'result';
            resultDiv.textContent = 'Adding beneficiary...\n' + JSON.stringify(beneficiaryData, null, 2);
            
            try {
                const response = await fetch('http://localhost:3000/api/v1/beneficiary/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(beneficiaryData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    testBeneficiaryId = result.beneficiaryId || result.id || Date.now();
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ Beneficiary added successfully!\n\n' + JSON.stringify(result, null, 2);
                } else {
                    throw new Error(result.message || 'Failed to add beneficiary');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Error adding beneficiary: ' + error.message;
            }
        }
        
        // Test getting beneficiaries
        async function testGetBeneficiaries() {
            const resultDiv = document.getElementById('testResult');
            
            resultDiv.className = 'result';
            resultDiv.textContent = 'Fetching beneficiaries...';
            
            try {
                const response = await fetch('http://localhost:3000/api/v1/beneficiary/all');
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ Beneficiaries retrieved successfully!\n\n' + JSON.stringify(result, null, 2);
                } else {
                    throw new Error(result.message || 'Failed to get beneficiaries');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Error getting beneficiaries: ' + error.message;
            }
        }
        
        // Test deleting beneficiary
        async function testDeleteBeneficiary() {
            const resultDiv = document.getElementById('testResult');
            
            if (!testBeneficiaryId) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ No test beneficiary to delete. Please add a beneficiary first.';
                return;
            }
            
            resultDiv.className = 'result';
            resultDiv.textContent = 'Deleting beneficiary ID: ' + testBeneficiaryId + '...';
            
            try {
                const response = await fetch(`http://localhost:3000/api/v1/beneficiary/${testBeneficiaryId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ Beneficiary deleted successfully!\n\n' + JSON.stringify(result, null, 2);
                    testBeneficiaryId = null;
                } else {
                    throw new Error(result.message || 'Failed to delete beneficiary');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Error deleting beneficiary: ' + error.message;
            }
        }
        
        // Auto-test connection on page load
        window.addEventListener('load', () => {
            testConnection();
        });
    </script>
</body>
</html>
